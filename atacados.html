<!DOCTYPE html><html lang="pt-BR"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atacados CHR - CHR Representacao</title>
<script src="gate.js"></script>
<style>
  :root{--bg:#f4f6f8;--panel:#fff;--ink:#1f2a37;--muted:#6b7785;--line:#e3e8ee;--brand:#1f5fae;--brand-d:#16467f;
    --contato:#1f6feb;--contato-bg:#e7f0ff;--prospectar:#b7791f;--prospectar-bg:#fdf3e0;--ativo:#15803d;--ativo-bg:#e6f5ec;--inativo:#64748b;--inativo-bg:#eef1f5;
    --alta:#dc2626;--alta-bg:#fde8e8;--media:#ea8a04;--media-bg:#fdf0dc;--baixa:#64748b;--baixa-bg:#eef1f5;
    --wa:#25d366;--wa-d:#1da851;--shadow:0 1px 3px rgba(16,24,40,.08);--shadow-lg:0 10px 30px rgba(16,24,40,.14);--radius:12px;}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit;font-size:14px}
  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header.top{background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;padding:12px 20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;box-shadow:var(--shadow)}
  header.top h1{font-size:17px;margin:0;font-weight:800}header.top .sub{font-size:11.5px;opacity:.85;margin-top:2px}
  .backlink{color:#fff;text-decoration:none;font-weight:700;background:rgba(255,255,255,.14);padding:7px 12px;border-radius:9px;font-size:13px;white-space:nowrap;align-self:center}
  .backlink:hover{background:rgba(255,255,255,.24)}
  .syncbadge{display:inline-block;font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;background:rgba(255,255,255,.2);color:#fff;vertical-align:middle}
  .syncbadge.ok{background:#1da851}.syncbadge.saving{background:#b7791f}.syncbadge.off{background:#64748b}.syncbadge.err{background:#dc2626}
  nav.tabs{display:flex;gap:6px;margin-left:auto}
  nav.tabs button{background:rgba(255,255,255,.12);color:#fff;border:none;padding:9px 18px;border-radius:9px;font-weight:700;font-size:13.5px}
  nav.tabs button:hover{background:rgba(255,255,255,.22)}nav.tabs button.on{background:#fff;color:var(--brand)}
  .view{flex:1;overflow:hidden;display:none;flex-direction:column}.view.on{display:flex}
  #viewDash{overflow-y:auto;padding:22px 26px;display:none}#viewDash.on{display:block}
  .dash-h{font-size:20px;font-weight:800;margin:0 0 4px}.dash-sub{color:var(--muted);margin-bottom:18px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:20px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;position:relative;overflow:hidden;cursor:pointer}
  .kpi:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px);transition:.15s}
  .kpi b{display:block;font-size:26px;line-height:1;font-weight:800}.kpi span{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
  .kpi .ac{position:absolute;left:0;top:0;bottom:0;width:5px}
  .k-contato .ac{background:var(--contato)}.k-contato b{color:var(--contato)}.k-prospectar .ac{background:var(--prospectar)}.k-prospectar b{color:var(--prospectar)}
  .k-ativo .ac{background:var(--ativo)}.k-ativo b{color:var(--ativo)}.k-inativo .ac{background:var(--inativo)}.k-inativo b{color:var(--inativo)}.k-total .ac{background:var(--brand)}.k-total b{color:var(--brand)}
  .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px}
  .pcard h3{margin:0 0 14px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .bar{display:grid;grid-template-columns:140px 1fr 44px;gap:10px;align-items:center;margin-bottom:8px}
  .bar .lbl{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar .track{background:#eef1f5;border-radius:6px;height:16px;overflow:hidden}.bar .fill{height:100%;border-radius:6px;background:var(--brand);min-width:2px}
  .bar .num{text-align:right;font-weight:700;font-size:13px;color:var(--muted)}
  .toolbar{background:var(--panel);border-bottom:1px solid var(--line);padding:10px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .search{flex:1;min-width:200px;position:relative}.search input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:10px;background:#fff}
  .search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.5}
  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 14px;border-radius:10px;font-weight:600;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .btn:hover{background:#f7f9fb}.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}.btn.primary:hover{background:var(--brand-d)}
  .filters{background:var(--panel);border-bottom:1px solid var(--line);padding:8px 16px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .fgroup{display:flex;gap:6px;align-items:center;flex-wrap:wrap}.fgroup>.lbl{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;margin-right:2px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 11px;font-size:12.5px;font-weight:600;color:var(--muted);user-select:none}
  .chip:hover{border-color:#c7d0db}.chip.on{color:#fff}
  .chip.on.s-contato{background:var(--contato);border-color:var(--contato)}.chip.on.s-prospectar{background:var(--prospectar);border-color:var(--prospectar)}
  .chip.on.s-ativo{background:var(--ativo);border-color:var(--ativo)}.chip.on.s-inativo{background:var(--inativo);border-color:var(--inativo)}
  .chip.on.p-alta{background:var(--alta);border-color:var(--alta)}.chip.on.p-media{background:var(--media);border-color:var(--media)}.chip.on.p-baixa{background:var(--baixa);border-color:var(--baixa)}
  .chip.on.t-tag{background:var(--brand);border-color:var(--brand)}.chip.on.b-brand{background:#0f2c4d;border-color:#0f2c4d}
  select.sel{border:1px solid var(--line);border-radius:10px;padding:7px 10px;background:#fff;font-weight:600;max-width:150px}
  .main{flex:1;display:flex;overflow:hidden}
  .list{width:390px;min-width:300px;border-right:1px solid var(--line);overflow-y:auto;background:var(--panel)}
  .listhead{padding:8px 16px;font-size:12px;color:var(--muted);position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--line);z-index:1;font-weight:600}
  .row{padding:11px 16px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:10px;align-items:flex-start}
  .row:hover{background:#f7f9fb}.row.sel{background:#eef4fd;box-shadow:inset 3px 0 0 var(--brand)}
  .dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex:none}
  .dot.s-contato{background:var(--contato)}.dot.s-prospectar{background:var(--prospectar)}.dot.s-ativo{background:var(--ativo)}.dot.s-inativo{background:var(--inativo)}
  .row .nm{font-weight:700;font-size:13.5px;line-height:1.25}.row .meta{font-size:11.5px;color:var(--muted);margin-top:2px}
  .row .mini{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;align-items:center}
  .pri-flag{font-size:10px;font-weight:800;padding:1px 6px;border-radius:6px;text-transform:uppercase}
  .pri-flag.alta{background:var(--alta-bg);color:var(--alta)}.pri-flag.media{background:var(--media-bg);color:var(--media)}.pri-flag.baixa{background:var(--baixa-bg);color:var(--baixa)}
  .tagmini{font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px;background:#eef1f5;color:#475569}
  .filmini{font-size:10px;font-weight:800;padding:1px 6px;border-radius:6px;background:#e7eefc;color:#1f5fae}
  .detail{flex:1;overflow-y:auto;padding:22px 26px;background:var(--bg)}
  .detail .empty{height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-direction:column;gap:10px;text-align:center}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:16px;max-width:960px}
  .card h2{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .titlebar{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;max-width:960px}
  .titlebar .ti{flex:1}.titlebar input.name{font-size:21px;font-weight:800;border:none;border-bottom:2px solid transparent;width:100%;padding:2px 0;background:transparent;color:var(--ink)}
  .titlebar input.name:focus{outline:none;border-bottom-color:var(--brand)}
  .btn-del{border:1px solid #f3c9c9;background:#fff;color:var(--alta);font-weight:700;border-radius:9px;padding:8px 12px;white-space:nowrap;align-self:center}
  .btn-del:hover{background:var(--alta-bg)}
  .field{margin-bottom:14px}.field>label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-bottom:6px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;flex-wrap:wrap}
  .seg button{border:none;background:#fff;padding:8px 15px;font-weight:700;color:var(--muted);border-right:1px solid var(--line)}.seg button:last-child{border-right:none}
  .seg button.on.s-contato{background:var(--contato);color:#fff}.seg button.on.s-prospectar{background:var(--prospectar);color:#fff}
  .seg button.on.s-ativo{background:var(--ativo);color:#fff}.seg button.on.s-inativo{background:var(--inativo);color:#fff}
  .seg button.on.p-alta{background:var(--alta);color:#fff}.seg button.on.p-media{background:var(--media);color:#fff}.seg button.on.p-baixa{background:var(--baixa);color:#fff}.seg button.on.p-none{background:#374151;color:#fff}
  .row2{display:flex;gap:14px;flex-wrap:wrap}.row2>.field{flex:1;min-width:200px}
  input.txt,select.txt{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 11px;background:#fff}
  textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;resize:vertical;min-height:60px;background:#fff}
  textarea:focus,input:focus,select:focus{outline:none;border-color:var(--brand)}
  .ro{background:#f6f8fa;color:#475569;border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-size:13px;white-space:pre-wrap;word-break:break-word}
  .tagrow{display:flex;gap:8px;flex-wrap:wrap}
  .tagtoggle{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-weight:700;color:var(--muted);font-size:12.5px}
  .tagtoggle.on{background:var(--brand);border-color:var(--brand);color:#fff}
  .brandtoggle{border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:6px 12px;font-weight:700;color:var(--muted);font-size:12px}
  .brandtoggle.on{background:#0f2c4d;border-color:#0f2c4d;color:#fff}
  .filtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .filtab{border:1px solid var(--line);background:#fff;border-radius:9px 9px 0 0;padding:8px 14px;font-weight:700;color:var(--muted);font-size:12.5px}
  .filtab.on{background:var(--brand);border-color:var(--brand);color:#fff}
  .ctt{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:9px;background:#fbfcfe}
  .ctt .row2{gap:10px}.ctt textarea{min-height:46px;margin-top:8px}
  .add-ctt{border:1.5px dashed #b9c4d0;background:#fff;color:var(--brand);border-radius:10px;padding:9px 14px;font-weight:700;width:100%;margin-top:4px}.add-ctt:hover{background:#f2f7fe}
  .del-ct{border:none;background:transparent;color:var(--alta);font-weight:700;padding:7px 10px;border-radius:8px}.del-ct:hover{background:var(--alta-bg)}
  .doctag{font-size:10px;font-weight:800;padding:1px 6px;border-radius:6px}.doctag.cnpj{background:#e7f0ff;color:#1f6feb}.doctag.cpf{background:#fdf0dc;color:#b7791f}
  .wa{background:var(--wa);color:#fff;border:none;border-radius:9px;padding:7px 12px;font-weight:700;display:inline-flex;align-items:center;gap:6px;font-size:12.5px}.wa:hover{background:var(--wa-d)}
  .pill{display:inline-block;font-size:11px;font-weight:800;padding:2px 9px;border-radius:999px}
  .pill.s-contato{background:var(--contato-bg);color:var(--contato)}.pill.s-prospectar{background:var(--prospectar-bg);color:var(--prospectar)}.pill.s-ativo{background:var(--ativo-bg);color:var(--ativo)}.pill.s-inativo{background:var(--inativo-bg);color:var(--inativo)}
  #mergeOvl{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding-top:8vh}
  .mbox{background:#fff;border-radius:14px;padding:20px 22px;width:460px;max-width:92vw;box-shadow:var(--shadow-lg)}.mbox h3{margin:0 0 6px}
  .mbox input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
  .mres{max-height:320px;overflow:auto}.mitem{padding:9px 11px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;cursor:pointer;font-weight:600;font-size:13px}.mitem:hover{background:#eef4fd;border-color:var(--brand)}
  .tk-wrap{max-width:900px;margin:0 auto}.tk-form{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:20px}
  .tk{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:11px;display:flex;gap:12px;align-items:flex-start}
  .tk.done{opacity:.62}.tk .chk{width:20px;height:20px;margin-top:2px;flex:none}.tk .ttl{font-weight:700;font-size:15px}.tk.done .ttl{text-decoration:line-through}
  .tk .sub{font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}.tk .obs{font-size:13px;margin-top:6px;white-space:pre-wrap}
  .tk .acts{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.tk .acts button{font-size:12.5px;padding:6px 10px}
  .gcal{background:#fff;border:1px solid #dadce0;color:#3c4043;border-radius:10px;padding:7px 11px;font-weight:700}.mailbtn{background:#fff;border:1px solid var(--line);color:var(--brand);border-radius:10px;padding:7px 11px;font-weight:700}
  .rem-badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;text-transform:uppercase}.rb-atrasada{background:var(--alta-bg);color:var(--alta)}.rb-hoje{background:var(--media-bg);color:var(--media)}.rb-prox{background:var(--baixa-bg);color:var(--baixa)}
  .tk-section-h{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:800;margin:18px 0 10px}
  .clientchip{background:#eef4fd;color:var(--brand);font-weight:700;font-size:11px;padding:2px 8px;border-radius:6px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1f2a37;color:#fff;padding:11px 20px;border-radius:10px;box-shadow:var(--shadow-lg);font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:50}.toast.show{opacity:1}
  @media(max-width:860px){.main{flex-direction:column}.list{width:100%;max-height:38vh;border-right:none;border-bottom:1px solid var(--line)}nav.tabs{margin-left:0}}

  .msel{position:relative;display:inline-block}
  .msel-btn{border:1px solid var(--line);border-radius:10px;padding:7px 10px;background:#fff;font-weight:600;cursor:pointer;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:inherit;font-size:inherit}
  .msel-btn:hover{background:#f9fafb}
  .msel-pop{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:50;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.15);padding:8px;min-width:240px}
  .msel-pop.open{display:block}
  .msel-search{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:8px;box-sizing:border-box;margin-bottom:6px;font-family:inherit;font-size:14px}
  .msel-items{max-height:260px;overflow-y:auto}
  .msel-empty{padding:8px;text-align:center;color:var(--muted);font-size:13px}
  .msel-item{display:flex;align-items:center;gap:6px;padding:5px 6px;cursor:pointer;border-radius:6px;user-select:none;font-size:14px}
  .msel-item:hover{background:#f3f4f6}
  .msel-item input{margin:0}
  .msel-actions{display:flex;gap:6px;margin-top:6px;padding-top:6px;border-top:1px solid var(--line)}
  .msel-actions button{flex:1;padding:6px;border:1px solid var(--line);border-radius:8px;cursor:pointer;font-weight:600;font-family:inherit;font-size:13px}
  .msel-clear{background:#f3f4f6}
  .msel-ok{background:#1f5fae;color:#fff;border-color:#1f5fae}
  .btn-dl{border:1px solid var(--line);border-radius:10px;padding:7px 12px;background:#15803d;color:#fff;font-weight:700;cursor:pointer;font-family:inherit;font-size:14px;display:inline-flex;align-items:center;gap:6px}
  .btn-dl:hover{background:#166534}
</style></head><body>
<div class="app">
  <header class="top">
    <a class='backlink' href='index.html'>&larr; Inicio</a>
    <div><h1>Atacados CHR <span id="syncBadge" class="syncbadge">&bull;</span></h1><div class="sub">Contatos com atacadistas - por razao social</div></div>
    <nav class="tabs"><button data-view="dash" class="on">Painel</button><button data-view="clientes">Clientes</button><button data-view="tarefas">Tarefas</button></nav>
  </header>
  <section class="view on" id="viewDash"></section>
  <section class="view" id="viewClientes">
    <div class="toolbar">
      <div class="search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><input id="q" type="text" placeholder="Buscar empresa, cidade, contato, documento..."></div>
      <button class="btn primary" id="newClient">+ Novo cliente</button>
      <button class="btn" id="exportBtn">Exportar</button>
      <button class="btn-dl" id="dlBtn" title="Baixar clientes filtrados em CSV">&#x2B07; Baixar filtrados</button>
    </div>
    <div class="filters">
      <div class="fgroup"><span class="lbl">Status</span><span id="fStatus"></span></div>
      <div class="fgroup"><span class="lbl">Prioridade</span><span id="fPri"></span></div>
      <div class="fgroup"><span class="lbl">Segmento</span><span id="fTags"></span></div>
      <div class="fgroup"><span class="lbl">Marcas</span><span id="fBrands"></span></div>
      <div class="fgroup"><span class="lbl">UF</span><div id="fUf"></div></div>
      <div class="fgroup"><span class="lbl">Cidade</span><div id="fCid"></div></div>
    </div>
    <div class="main"><div class="list" id="list"></div>
      <div class="detail" id="detail"><div class="empty"><div>Selecione um cliente ou crie um novo.</div></div></div></div>
  </section>
  <section class="view" id="viewTarefas"><div class="tk-wrap"><div class="tk-form" id="tkForm"></div><div id="tkList"></div></div></section>
</div>

}

/* ===== Multi-select widget (fUf, fCid) ===== */
function buildMsel(rootId,label,values,onChange){
  const root=document.getElementById(rootId); if(!root) return null;
  const sel=new Set(); let allValues=(values||[]).slice();
  root.classList.add("msel");
  root.innerHTML='<button class="msel-btn" type="button"></button>'
    +'<div class="msel-pop"><input class="msel-search" type="text" placeholder="Buscar..."><div class="msel-items"></div>'
    +'<div class="msel-actions"><button type="button" class="msel-clear">Limpar</button><button type="button" class="msel-ok">OK</button></div></div>';
  const btn=root.querySelector(".msel-btn");
  const pop=root.querySelector(".msel-pop");
  const itemsEl=root.querySelector(".msel-items");
  const searchEl=root.querySelector(".msel-search");
  function rebuild(){
    const flt=(searchEl.value||"").toLowerCase(); itemsEl.innerHTML="";
    let shown=0;
    allValues.forEach(function(v){
      if(flt && String(v).toLowerCase().indexOf(flt)<0) return;
      shown++;
      const w=document.createElement("label"); w.className="msel-item";
      const cb=document.createElement("input"); cb.type="checkbox"; cb.value=v; cb.checked=sel.has(v);
      cb.onchange=function(){ if(cb.checked) sel.add(v); else sel.delete(v); updateBtn(); onChange(sel); };
      w.appendChild(cb); w.appendChild(document.createTextNode(" "+v));
      itemsEl.appendChild(w);
    });
    if(!shown){ const e=document.createElement("div"); e.className="msel-empty"; e.textContent="(nada encontrado)"; itemsEl.appendChild(e); }
  }
  function updateBtn(){
    if(sel.size===0) btn.textContent=label+": todos";
    else if(sel.size<=2) btn.textContent=label+": "+[...sel].join(", ");
    else btn.textContent=label+": "+sel.size+" selecionados";
  }
  btn.onclick=function(e){
    e.stopPropagation();
    document.querySelectorAll(".msel-pop.open").forEach(function(p){ if(p!==pop) p.classList.remove("open"); });
    pop.classList.toggle("open");
    if(pop.classList.contains("open")){ rebuild(); setTimeout(function(){searchEl.focus();},10); }
  };
  searchEl.oninput=rebuild;
  root.querySelector(".msel-clear").onclick=function(){ sel.clear(); rebuild(); updateBtn(); onChange(sel); };
  root.querySelector(".msel-ok").onclick=function(){ pop.classList.remove("open"); };
  document.addEventListener("click",function(e){ if(!root.contains(e.target)) pop.classList.remove("open"); });
  updateBtn();
  return {
    setValues:function(vs){ allValues=(vs||[]).slice(); const keep=new Set(allValues); [...sel].forEach(function(v){ if(!keep.has(v)) sel.delete(v); }); updateBtn(); },
    clear:function(){ sel.clear(); updateBtn(); },
    selected:sel,
    setSelected:function(arr){ sel.clear(); (arr||[]).forEach(function(v){sel.add(v);}); updateBtn(); }
  };
}
function computeCidadesForUf(ufSet){
  const out=new Set();
  for(let i=0;i<DB.clientes.length;i++){ const c=DB.clientes[i];
    const fls=filiaisOf(c);
    for(let j=0;j<fls.length;j++){ const f=fls[j];
      if(!f||!f.cid) continue;
      if(!ufSet||ufSet.size===0||ufSet.has(f.uf||"")) out.add(f.cid);
    }
  }
  return [...out].sort();
}

/* ===== Download dos filtrados em CSV ===== */
function downloadFilteredCSV(){
  if(!RESULTS||!RESULTS.length){ toast("Nenhum cliente nos filtros."); return; }
  const headers=["ID","Nome","Status","Prioridade","Tipo","Tags/Segmento","Marcas","UF","Qtd Filiais","CNPJs","Cidades","Bairros","Enderecos","CEPs","Telefones","E-mails","Contatos","Observacao","Site","Chave (lk)"];
  const rows=[headers];
  for(let k=0;k<RESULTS.length;k++){
    const c=RESULTS[k]; const fls=filiaisOf(c);
    const cnpjs=[],cidades=[],bairros=[],ends=[],ceps=[],tels=[],emails=[],conts=[];
    for(let fi=0;fi<fls.length;fi++){
      const f=fls[fi];
      if(f.doc) cnpjs.push(f.doc);
      if(f.cid) cidades.push(f.cid);
      if(f.bai) bairros.push(f.bai);
      if(f.end) ends.push(f.end);
      if(f.cep) ceps.push(f.cep);
      const cn=[]; if(f.cont) cn.push(f.cont);
      (f.contatos||[]).forEach(function(ct){
        if(!ct||!ct.nome) return;
        let txt=ct.nome;
        if(ct.papel) txt+=" ("+ct.papel+")";
        if(ct.telefone) txt+=" "+ct.telefone;
        if(ct.email) txt+=" "+ct.email;
        cn.push(txt);
        if(ct.telefone) tels.push(ct.telefone);
        if(ct.email) emails.push(ct.email);
      });
      if(cn.length) conts.push(cn.join(", "));
    }
    function uniq(a){ return [...new Set(a.filter(Boolean))]; }
    rows.push([
      c.id, c.nome||"", c.status||"", c.prioridade||"", c.tipo||"",
      (c.tags||[]).join(", "), (c.brands||[]).join(", "), (c.uf||[]).join(", "),
      fls.length,
      uniq(cnpjs).join(" | "),
      uniq(cidades).join(" | "), uniq(bairros).join(" | "),
      uniq(ends).join(" | "), uniq(ceps).join(" | "),
      uniq(tels).join(" | "), uniq(emails).join(" | "),
      uniq(conts).join(" | "),
      c.obs||"", c.site||"", c.lk||""
    ]);
  }
  const csv="﻿"+rows.map(function(r){
    return r.map(function(v){
      const ss=String(v==null?"":v);
      if(ss.indexOf(";")>=0||ss.indexOf('"')>=0||ss.indexOf("\n")>=0||ss.indexOf("\r")>=0) return '"'+ss.replace(/"/g,'""')+'"';
      return ss;
    }).join(";");
  }).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="atacados_filtrados_"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(a.href); },1000);
  toast("Baixados "+RESULTS.length+" clientes");
}
document.addEventListener("DOMContentLoaded",function(){
  const b=document.getElementById("dlBtn");
  if(b) b.onclick=downloadFilteredCSV;
  try{var _p=new URLSearchParams(location.search);var _q=_p.get("busca")||_p.get("cli");if(_q){if(typeof showView==="function")showView("clientes");var _i=document.getElementById("q");if(_i)_i.value=_q;filters.q=_q;applyFilters();var _n=_q.toLowerCase();var _m=DB.clientes.find(function(c){return (c.nome||"").toLowerCase()===_n;})||DB.clientes.find(function(c){return (c.nome||"").toLowerCase().indexOf(_n)>=0;});if(_m){selectedId=_m.id;selFil=0;if(typeof renderList==="function")renderList();if(typeof renderDetail==="function")renderDetail();}}}catch(e){}
});

/* ===== sync GET (full DB, store atacados_v2) ===== */
const API_URL="api.php"; const STORE="atacados_v2";
let API_ON=false,pushTimer=null,pushing=false,dirty=false,lastStamp=0,pollTimer=null;
function siteToken(){try{return (window.chrToken&&window.chrToken())||sessionStorage.getItem("chr_pass")||"";}catch(e){return"";}}
function saveLocal(){try{localStorage.setItem(STORE_KEY,JSON.stringify(DB));}catch(e){}}
function saveSoon(){saveLocal();schedulePush();if(typeof reconcileVinOut==='function')reconcileVinOut();}
function saveNow(){saveLocal();schedulePush();}
function schedulePush(){dirty=true;if(API_ON)setSync("saving");clearTimeout(pushTimer);pushTimer=setTimeout(pushToServer,700);}
function setSync(s){const b=document.getElementById("syncBadge");if(!b)return;b.className="syncbadge "+(s||"");b.textContent=s==="ok"?"sincronizado":s==="saving"?"salvando...":s==="off"?"offline (local)":s==="err"?"erro ao salvar":"•";}
function api(p){return fetch(API_URL+"?"+p).then(r=>r.json());}
async function putStore(obj){const str=JSON.stringify(obj),tok=encodeURIComponent(siteToken());const sid=Math.random().toString(36).slice(2)+Date.now().toString(36);const CH=6000,total=Math.max(1,Math.ceil(str.length/CH));for(let i=0;i<total;i++){const part=encodeURIComponent(str.slice(i*CH,(i+1)*CH));const j=await api("action=put&token="+tok+"&store="+STORE+"&sid="+sid+"&seq="+i+"&total="+total+"&part="+part);if(!j||!j.ok)throw new Error("put");}const jc=await api("action=commit&token="+tok+"&store="+STORE+"&sid="+sid);if(!jc||!jc.ok)throw new Error("commit");return jc.updated_at;}
async function pushToServer(){if(!API_ON){dirty=false;return;}if(pushing){schedulePush();return;}pushing=true;try{DB.updated_at=Date.now();const u=await putStore(DB);lastStamp=u||DB.updated_at;dirty=false;setSync("ok");}catch(e){setSync("err");}finally{pushing=false;}}
function reRenderAll(){renderFilters();applyFilters();if(selectedId&&getById(selectedId))renderDetail();if(currentView==="dash")renderDash();if(currentView==="tarefas")renderTarefas();}
async function initServerSync(){const tok=siteToken();if(!tok){API_ON=false;setSync("off");return;}try{const j=await api("action=get&token="+encodeURIComponent(tok)+"&store="+STORE);if(!j||!j.ok){API_ON=false;setSync("off");return;}API_ON=true;if(j.data&&j.data.clientes){DB=j.data;if(!Array.isArray(DB.tarefas))DB.tarefas=[];lastStamp=j.updated_at||0;saveLocal();reRenderAll();setSync("ok");}else{await pushToServer();}startPolling();vinInit();}catch(e){API_ON=false;setSync("off");}}
function startPolling(){if(pollTimer)return;pollTimer=setInterval(async()=>{if(!API_ON||pushing||dirty)return;const ae=document.activeElement;if(ae&&/INPUT|TEXTAREA|SELECT/.test(ae.tagName))return;try{const j=await api("action=stamp&token="+encodeURIComponent(siteToken())+"&store="+STORE);if(j&&j.ok&&j.updated_at&&j.updated_at!==lastStamp){const j2=await api("action=get&token="+encodeURIComponent(siteToken())+"&store="+STORE);if(j2&&j2.ok&&j2.data&&j2.data.clientes){DB=j2.data;if(!Array.isArray(DB.tarefas))DB.tarefas=[];lastStamp=j2.updated_at||0;saveLocal();reRenderAll();setSync("ok");}}}catch(e){setSync("off");}},15000);}
window.addEventListener("chr-auth", initServerSync);

var VIN={}, vinSnap={}, vinApplied={}, applyingVin=false, vinPushT=null, vinPollT=null;
function atContacts(c){ var a=[]; var fl=c.filiais||[]; for(var i=0;i<fl.length;i++){ var ct=fl[i].contatos||[]; for(var j=0;j<ct.length;j++){ var k=ct[j]; a.push({nome:k.nome||"",papel:k.papel||"",telefone:k.telefone||"",whatsapp:k.whatsapp||"",email:k.email||"",obs:k.obs||""}); } } return a; }
function vinFields(c){ return {c:atContacts(c),o:c.obs||"",s:(c.status==="Prospectar"?"Prospecção":c.status)}; }
async function putStoreNamed(name,obj){ var str=JSON.stringify(obj),tok=encodeURIComponent(siteToken()),sid=Math.random().toString(36).slice(2)+Date.now().toString(36),CH=6000,total=Math.max(1,Math.ceil(str.length/CH)); for(var i=0;i<total;i++){ var part=encodeURIComponent(str.slice(i*CH,(i+1)*CH)); var j=await api("action=put&token="+tok+"&store="+name+"&sid="+sid+"&seq="+i+"&total="+total+"&part="+part); if(!j||!j.ok)throw new Error("put"); } var jc=await api("action=commit&token="+tok+"&store="+name+"&sid="+sid); if(!jc||!jc.ok)throw new Error("commit"); return jc.updated_at; }
function vinPush(){ clearTimeout(vinPushT); vinPushT=setTimeout(function(){ if(!API_ON)return; putStoreNamed("vinculo",{VIN:VIN}).catch(function(){}); },1000); }
function reconcileVinOut(){ if(applyingVin)return; var ch=false; for(var i=0;i<DB.clientes.length;i++){ var c=DB.clientes[i]; if(!c.lk)continue; var cur=vinFields(c),ser=JSON.stringify(cur); if(vinSnap[c.lk]!==ser){ var v=Date.now(); VIN[c.lk]={c:cur.c,o:cur.o,s:cur.s,v:v}; vinSnap[c.lk]=ser; vinApplied[c.lk]=v; ch=true; } } if(ch)vinPush(); }
function mergeContacts(dst,inc){ for(var i=0;i<inc.length;i++){ var k=inc[i],nm=slug(k.nome),f=null; if(nm){ for(var j=0;j<dst.length;j++){ if(slug(dst[j].nome)===nm){f=dst[j];break;} } } if(f)Object.assign(f,k); else dst.push(Object.assign({},k)); } return dst; }
function applyVinOne(c,e){ c.obs=e.o; c.status=(e.s==="Prospecção"?"Prospectar":e.s); c.filiais=(c.filiais&&c.filiais.length)?c.filiais:[{}]; c.filiais[0].contatos=c.filiais[0].contatos||[]; mergeContacts(c.filiais[0].contatos,e.c||[]); rebuildUf(c); vinSnap[c.lk]=JSON.stringify(vinFields(c)); vinApplied[c.lk]=e.v; }
function applyVinAll(){ applyingVin=true; var ch=false; for(var i=0;i<DB.clientes.length;i++){ var c=DB.clientes[i]; if(!c.lk)continue; var e=VIN[c.lk]; if(!e)continue; if(vinApplied[c.lk]===e.v)continue; applyVinOne(c,e); ch=true; } applyingVin=false; if(ch){ saveLocal(); schedulePush(); reRenderAll(); } }
async function vinInit(){ var tok=siteToken(); if(!tok)return; for(var i=0;i<DB.clientes.length;i++){ var c=DB.clientes[i]; if(c.lk)vinSnap[c.lk]=JSON.stringify(vinFields(c)); } try{ var j=await api("action=get&token="+encodeURIComponent(tok)+"&store=vinculo"); if(j&&j.ok&&j.data&&j.data.VIN){ VIN=j.data.VIN; applyVinAll(); } }catch(e){} if(!vinPollT)vinPollT=setInterval(async function(){ if(!API_ON)return; try{ var j=await api("action=get&token="+encodeURIComponent(siteToken())+"&store=vinculo"); if(j&&j.ok&&j.data&&j.data.VIN){ VIN=j.data.VIN; applyVinAll(); } }catch(e){} },15000); }
renderFilters(); applyFilters(); renderDash();
if(siteToken()) initServerSync();
</script></body></html>
